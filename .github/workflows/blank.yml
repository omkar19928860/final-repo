name: Sync latest tags from referenced repos

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-tags:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Debug files
        run: |
          pwd
          ls -la
          find . -name "abc.yml"

      - name: Update versions
        run: |
          echo "yahan teri python update logic aayegi"

      - name: Create feature branch and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          NEW_BRANCH="tag-sync-$(date -u +'%Y%m%d-%H%M%S')"
          git checkout -b "$NEW_BRANCH"

          git add abc.yml
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "chore: sync latest release tags"
          git push origin "$NEW_BRANCH"
