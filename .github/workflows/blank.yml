name: Sync latest tags from referenced repos

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-tags:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout final repo
        uses: actions/checkout@v4

      - name: Update versions from latest releases
        run: |
          python3 <<'PY'
          import urllib.request
          import json
          import re

          FILE_PATH = "abc.yml"

          with open(FILE_PATH, "r", encoding="utf-8") as f:
              content = f.read()

          lines = content.splitlines()

          def get_latest_release(owner, repo):
              url = f"https://api.github.com/repos/{owner}/{repo}/releases/latest"
              req = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "User-Agent": "github-actions"
                  }
              )
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read().decode())
              return data["tag_name"]

          i = 0
          changed = False
          while i < len(lines):
              src_match = re.match(r"^\s*-\s*src:\s*https://github\.com/([^/]+)/([^/\s]+)\s*$", lines[i])
              if src_match:
                  owner = src_match.group(1)
                  repo = src_match.group(2)

                  try:
                      latest_tag = get_latest_release(owner, repo)
                      print(f"{repo} latest release: {latest_tag}")
                  except Exception as e:
                      print(f"Failed to get latest release for {repo}: {e}")
                      i += 1
                      continue

                  # next few lines me version update
                  for j in range(i + 1, min(i + 6, len(lines))):
                      if re.match(r"^\s*version:\s*", lines[j]):
                          old_line = lines[j]
                          new_line = re.sub(r"(^\s*version:\s*).*$", rf"\1{latest_tag}", lines[j])
                          if old_line != new_line:
                              lines[j] = new_line
                              changed = True
                          break
              i += 1

          if changed:
              with open(FILE_PATH, "w", encoding="utf-8") as f:
                  f.write("\n".join(lines) + "\n")
              print("abc.yml updated")
          else:
              print("No change found")
          PY

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add abc.yml
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "chore: sync latest release tags"
          git push
