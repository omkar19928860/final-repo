name: Sync latest tags from referenced repos

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-tags:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Debug files
        run: |
          pwd
          ls -la
          find . -name "abc.yml"

      - name: Update versions from latest releases
        id: update_versions
        run: |
          python3 <<'PY'
          import urllib.request
          import json
          import re
          import os
          from datetime import datetime

          FILE_PATH = "abc.yml"

          if not os.path.exists(FILE_PATH):
              raise FileNotFoundError(f"{FILE_PATH} not found in repo root")

          with open(FILE_PATH, "r", encoding="utf-8") as f:
              content = f.read()

          lines = content.splitlines()

          def get_latest_release(owner, repo):
              url = f"https://api.github.com/repos/{owner}/{repo}/releases/latest"
              req = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "User-Agent": "github-actions"
                  }
              )
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read().decode())
              return data["tag_name"]

          changed = False
          updated_repos = []

          i = 0
          while i < len(lines):
              src_match = re.match(r"^\s*-\s*src:\s*https://github\.com/([^/]+)/([^/\s]+)\s*$", lines[i])
              if src_match:
                  owner = src_match.group(1)
                  repo = src_match.group(2)

                  try:
                      latest_tag = get_latest_release(owner, repo)
                      print(f"{repo} latest release: {latest_tag}")
                  except Exception as e:
                      print(f"Failed to get latest release for {repo}: {e}")
                      i += 1
                      continue

                  for j in range(i + 1, min(i + 6, len(lines))):
                      if re.match(r"^\s*version:\s*", lines[j]):
                          old_line = lines[j]
                          new_line = re.sub(r"(^\s*version:\s*).*$", rf"\1{latest_tag}", lines[j])
                          if old_line != new_line:
                              print(f"Updating {repo}: {old_line.strip()} -> {new_line.strip()}")
                              lines[j] = new_line
                              changed = True
                              updated_repos.append(repo)
                          break
              i += 1

          output_file = os.environ["GITHUB_OUTPUT"]

          if changed:
              with open(FILE_PATH, "w", encoding="utf-8") as f:
                  f.write("\n".join(lines) + "\n")

              ts = datetime.utcnow().strftime("%Y%m%d-%H%M%S")
              branch_name = f"tag-sync-{ts}"

              with open(output_file, "a", encoding="utf-8") as out:
                  out.write("changed=true\n")
                  out.write(f"branch_name={branch_name}\n")
                  out.write(f"updated_repos={','.join(updated_repos)}\n")
          else:
              with open(output_file, "a", encoding="utf-8") as out:
                  out.write("changed=false\n")
          PY

      - name: Create feature branch and push
        if: steps.update_versions.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          NEW_BRANCH="${{ steps.update_versions.outputs.branch_name }}"

          git checkout -b "$NEW_BRANCH"
          git add abc.yml
          git commit -m "chore: sync latest release tags"
          git push origin "$NEW_BRANCH"

      - name: No changes
        if: steps.update_versions.outputs.changed != 'true'
        run: echo "No version change found. Main branch untouched."
