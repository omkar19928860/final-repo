name: Sync latest tags in selected branch   # Workflow name shown in GitHub Actions UI

on:
  workflow_dispatch:   # Manual trigger (user can run this workflow from UI)

permissions:
  contents: write   # Allow workflow to commit and push changes to repository

jobs:
  sync-tags:   # Main job name
    if: github.ref_name != 'main'   # Prevent execution on main branch
    runs-on: ubuntu-latest   # Use latest Ubuntu runner

    steps:
      - name: Checkout selected branch   # Step to fetch code from repository
        uses: actions/checkout@v5   # Official GitHub action to checkout code
        with:
          ref: ${{ github.ref_name }}   # Checkout the branch from which workflow is triggered
          fetch-depth: 0   # Fetch full history (required for commits and tags)

      - name: Show selected branch   # Debug step to verify branch
        run: |
          echo "Workflow triggered from branch: ${{ github.ref_name }}"   # Print branch name
          git branch --show-current   # Show current checked-out branch

      - name: Debug files   # Debug step to locate target YAML file
        run: |
          pwd   # Print current working directory
          ls -la   # List all files in directory
          find . -name "abc.yml"   # Search for target file

      - name: Update versions from latest releases   # Main logic step
        id: update_versions   # Step ID used for condition check later
        run: |
          python3 <<'PY'
          import urllib.request   # For making HTTP requests to GitHub API
          import json   # For parsing API response
          import re   # For regex matching
          import os   # For file and environment operations

          FILE_PATH = "abc.yml"   # Target YAML file to update

          if not os.path.exists(FILE_PATH):   # Check if file exists
              raise FileNotFoundError(f"{FILE_PATH} not found in repo root")   # Fail if missing

          with open(FILE_PATH, "r", encoding="utf-8") as f:   # Read file content
              content = f.read()

          lines = content.splitlines()   # Convert file into list of lines

          def get_latest_release(owner, repo):   # Function to fetch latest release
              url = f"https://api.github.com/repos/{owner}/{repo}/releases/latest"   # GitHub API URL
              req = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",   # API format
                      "User-Agent": "github-actions"   # Required header
                  }
              )
              with urllib.request.urlopen(req) as resp:   # Call API
                  data = json.loads(resp.read().decode())   # Parse response
              return data["tag_name"]   # Return latest release tag

          changed = False   # Flag to track if file is modified

          i = 0
          while i < len(lines):   # Loop through each line
              src_match = re.match(r"^\s*-\s*src:\s*https://github\.com/([^/]+)/([^/\s]+)\s*$", lines[i])   # Match repo URL
              if src_match:
                  owner = src_match.group(1)   # Extract repo owner
                  repo = src_match.group(2)   # Extract repo name

                  try:
                      latest_tag = get_latest_release(owner, repo)   # Fetch latest tag
                      print(f"{repo} latest release: {latest_tag}")   # Log output
                  except Exception as e:
                      print(f"Failed to get latest release for {repo}: {e}")   # Handle error
                      i += 1
                      continue

                  for j in range(i + 1, min(i + 6, len(lines))):   # Look ahead for version field
                      if re.match(r"^\s*version:\s*", lines[j]):   # Match version line
                          old_line = lines[j]
                          new_line = re.sub(r"(^\s*version:\s*).*$", rf"\1{latest_tag}", lines[j])   # Replace version
                          if old_line != new_line:
                              print(f"Updating {repo}: {old_line.strip()} -> {new_line.strip()}")   # Log change
                              lines[j] = new_line   # Update line
                              changed = True   # Mark file as changed
                          break
              i += 1

          output_file = os.environ["GITHUB_OUTPUT"]   # GitHub output file

          if changed:
              with open(FILE_PATH, "w", encoding="utf-8") as f:   # Write updated content
                  f.write("\n".join(lines) + "\n")
              with open(output_file, "a", encoding="utf-8") as out:
                  out.write("changed=true\n")   # Mark output as changed
          else:
              with open(output_file, "a", encoding="utf-8") as out:
                  out.write("changed=false\n")   # No change detected
          PY

      - name: Commit and push in same selected branch   # Commit step
        if: steps.update_versions.outputs.changed == 'true'   # Run only if file changed
        run: |
          git config user.name "github-actions[bot]"   # Set commit author name
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"   # Set email

          TARGET_BRANCH="${{ github.ref_name }}"   # Store branch name

          git add abc.yml   # Stage updated file
          git diff --cached --quiet && echo "No changes to commit" && exit 0   # Skip if no changes

          git commit -m "chore: sync latest release tags"   # Commit changes
          git push origin "HEAD:${TARGET_BRANCH}"   # Push to same branch

      - name: No changes   # Fallback step
        if: steps.update_versions.outputs.changed != 'true'   # If no update happened
        run: echo "No version change found. Selected branch untouched."   # Print message

  block-main:   # Separate job to block main branch
    if: github.ref_name == 'main'   # Trigger only on main
    runs-on: ubuntu-latest
    steps:
      - name: Block main branch run   # Prevent execution
        run: |
          echo "This workflow is not allowed on main branch."   # Message
          exit 1   # Fail workflow intentionally
